name: Build

on:
  push:
    tags:
      - 'v*'
    branches:
      - 'v*'
  pull_request:
    tags:
      - 'v*'
    branches:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    env:
      ARTIFACT_NAME: ArkPets
    steps:
      - name: Show meta info
        run: |
          echo "Current ref: ${{ github.ref }}"
          echo "Current sha: ${{ github.sha }}"

      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'liberica'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: '8.14.3'

      - name: Setup Inno Setup
        run: choco install innosetup --no-progress

      - name: Execute gradle tasks
        run: gradle clean distAll

      - name: Upload exe
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}-Setup.exe
          path: desktop/build/dist/*.exe

      - name: Upload zip
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}.zip
          path: desktop/build/dist/*.zip

      - name: Upload jar
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.ARTIFACT_NAME }}.jar
          path: desktop/build/dist/*.jar

